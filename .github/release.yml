changelog:
  exclude:
    labels:
      - ignore for release
  categories:
    - title: Breaking Changes 🚨
      labels:
        - breaking changes
    - title: New features 🎉
      labels:
        - new feature
    - title: Improvements 🌱
      labels:
        - improvement
    - title: Bug fixes 🛠
      labels:
        - bug
    - title: Other 📚
      labels:
        - "*"
