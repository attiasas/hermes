name: Build And Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build and Test - (${{ matrix.os }})
    runs-on: ${{ matrix.os }}-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu, windows, macos ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Clean
        run: ./gradlew clean --no-daemon

      - name: Build and test
        run: ./gradlew build publishToMavenLocal :hermes-gradle-plugin:publishToMavenLocal :hermes-core:test hermes-tooling-test :hermes-gradle-plugin:test :hermes-cli:test --no-daemon --stacktrace

      - name: Publish test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Gradle tests (${{ matrix.os }})
          path: "**/build/test-results/test/*.xml"
          reporter: java-junit
          fail-on-error: false
          use-actions-summary: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ matrix.os }}
          path: |
            **/build/test-results/test/
            **/build/reports/tests/
          if-no-files-found: ignore

  export-html:
    name: Test Export HTML
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - name: Export HTML
        run: ./gradlew :dogfood-simulation:hermesExportHtml --no-daemon --stacktrace
      - name: Validate HTML export zip
        run: |
          chmod +x .github/scripts/validate-export-zip.sh
          ZIP=$(ls dogfood-simulation/build/dist/html/*-html.zip)
          .github/scripts/validate-export-zip.sh html "$ZIP"
      - name: Write export summary
        if: success()
        run: |
          chmod +x .github/scripts/write-export-summary.sh
          .github/scripts/write-export-summary.sh "HTML export" export-html "dogfood-simulation/build/dist/html/*-html.zip"
      - name: Upload HTML export
        uses: actions/upload-artifact@v7
        with:
          name: export-html
          path: dogfood-simulation/build/dist/html/*.zip
          if-no-files-found: error

  export-android:
    name: Test Export Android
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
      - name: Export Android
        run: ./gradlew :dogfood-simulation:hermesExportAndroid --no-daemon --stacktrace
      - name: Validate Android export zip
        run: |
          chmod +x .github/scripts/validate-export-zip.sh
          ZIP=$(ls dogfood-simulation/build/dist/android/*-android.zip)
          .github/scripts/validate-export-zip.sh android "$ZIP"
      - name: Write export summary
        if: success()
        run: |
          chmod +x .github/scripts/write-export-summary.sh
          .github/scripts/write-export-summary.sh "Android export" export-android "dogfood-simulation/build/dist/android/*-android.zip"
      - name: Upload Android export
        uses: actions/upload-artifact@v7
        with:
          name: export-android
          path: dogfood-simulation/build/dist/android/*.zip
          if-no-files-found: error

  export-desktop-linux:
    name: Test Export Desktop (Linux)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - name: Export desktop (linuxX64)
        run: ./gradlew :dogfood-simulation:hermesExportDesktop --no-daemon --stacktrace
      - name: Validate desktop linux export zip
        run: |
          chmod +x .github/scripts/validate-export-zip.sh
          ZIP=$(ls dogfood-simulation/build/dist/desktop/*-linux-x64.zip)
          .github/scripts/validate-export-zip.sh desktop-linux "$ZIP"
      - name: Write export summary
        if: success()
        run: |
          chmod +x .github/scripts/write-export-summary.sh
          .github/scripts/write-export-summary.sh "Desktop Linux export" export-desktop-linux "dogfood-simulation/build/dist/desktop/*-linux-x64.zip"
      - name: Upload desktop linux zip
        uses: actions/upload-artifact@v7
        with:
          name: export-desktop-linux
          path: dogfood-simulation/build/dist/desktop/*-linux-x64.zip
          if-no-files-found: error

  export-desktop-macos:
    name: Test Export Desktop (macOS)
    runs-on: macos-latest
    needs: build
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - name: Export desktop (mac)
        run: ./gradlew :dogfood-simulation:hermesExportDesktop --no-daemon --stacktrace
      - name: Validate desktop mac export zips
        run: |
          chmod +x .github/scripts/validate-export-zip.sh
          for ZIP in dogfood-simulation/build/dist/desktop/*-macos-*.zip; do
            .github/scripts/validate-export-zip.sh desktop-macos "$ZIP"
          done
      - name: Write export summary
        if: success()
        run: |
          chmod +x .github/scripts/write-export-summary.sh
          .github/scripts/write-export-summary.sh "Desktop macOS export" export-desktop-macos "dogfood-simulation/build/dist/desktop/*-macos-*.zip"
      - name: Upload desktop mac zips
        uses: actions/upload-artifact@v7
        with:
          name: export-desktop-macos
          path: dogfood-simulation/build/dist/desktop/*-macos-*.zip
          if-no-files-found: error

  export-desktop-windows:
    name: Test Export Desktop (Windows)
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - name: Export desktop (winX64)
        run: ./gradlew :dogfood-simulation:hermesExportDesktop --no-daemon --stacktrace
      - name: Validate desktop windows export zip
        shell: bash
        run: |
          chmod +x .github/scripts/validate-export-zip.sh
          ZIP=$(ls dogfood-simulation/build/dist/desktop/*-windows-x64.zip)
          .github/scripts/validate-export-zip.sh desktop-windows "$ZIP"
      - name: Write export summary
        if: success()
        shell: bash
        run: |
          chmod +x .github/scripts/write-export-summary.sh
          .github/scripts/write-export-summary.sh "Desktop Windows export" export-desktop-windows "dogfood-simulation/build/dist/desktop/*-windows-x64.zip"
      - name: Upload desktop windows zip
        uses: actions/upload-artifact@v7
        with:
          name: export-desktop-windows
          path: dogfood-simulation/build/dist/desktop/*-windows-x64.zip
          if-no-files-found: error
