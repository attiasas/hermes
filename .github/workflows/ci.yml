# Every push runs CI. pull_request is kept for fork contributions only; same-repo PRs
# are covered by the push to the PR branch (avoids duplicate runs on synchronize).
name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    strategy:
      fail-fast: false
      matrix:
        java: ["17"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fork PR: branch tip; push: default ref for the branch
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew clean build --no-daemon --stacktrace
