name: Build And Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build and Test - (${{ matrix.os }})
    runs-on: ${{ matrix.os }}-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, windows, macos]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew clean build publishToMavenLocal :hermes-gradle-plugin:publishToMavenLocal :hermes-gradle-plugin:test :hermes-cli:test --no-daemon --stacktrace

      - name: Publish test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Gradle tests (${{ matrix.os }})
          path: "**/build/test-results/test/*.xml"
          reporter: java-junit
          fail-on-error: false
          use-actions-summary: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}
          path: |
            **/build/test-results/test/
            **/build/reports/tests/
          if-no-files-found: ignore

  export-html:
    name: Export HTML
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Export HTML
        run: ./gradlew :game:hermesExportHtml --no-daemon --stacktrace
      - name: Validate HTML export zip
        run: |
          ZIP=$(ls game/build/dist/html/*-html.zip)
          unzip -l "$ZIP" | grep -q 'index.html'
      - name: Upload HTML export
        uses: actions/upload-artifact@v4
        with:
          name: export-html
          path: game/build/dist/html/*.zip
          if-no-files-found: error

  export-android:
    name: Export Android
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Export Android
        run: ./gradlew :game:hermesExportAndroid --no-daemon --stacktrace
      - name: Validate Android export zip
        run: |
          ZIP=$(ls game/build/dist/android/*-android.zip)
          unzip -l "$ZIP" | grep -q '\.apk'
      - name: Upload Android export
        uses: actions/upload-artifact@v4
        with:
          name: export-android
          path: game/build/dist/android/*.zip
          if-no-files-found: error

  export-desktop-linux:
    name: Export Desktop (Linux)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Export desktop (linuxX64)
        run: ./gradlew :game:zipHermesExportDesktopLinuxX64 --no-daemon --stacktrace
      - name: Upload desktop linux zip
        uses: actions/upload-artifact@v4
        with:
          name: export-desktop-linux
          path: game/build/dist/desktop/*-linux-x64.zip
          if-no-files-found: error

  export-desktop-macos:
    name: Export Desktop (macOS)
    runs-on: macos-latest
    needs: build
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Export desktop (mac)
        run: ./gradlew :game:zipHermesExportDesktopMacM1 :game:zipHermesExportDesktopMacX64 --no-daemon --stacktrace
      - name: Upload desktop mac zips
        uses: actions/upload-artifact@v4
        with:
          name: export-desktop-macos
          path: game/build/dist/desktop/*-macos-*.zip
          if-no-files-found: error

  export-desktop-windows:
    name: Export Desktop (Windows)
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Export desktop (winX64)
        run: ./gradlew :game:zipHermesExportDesktopWinX64 --no-daemon --stacktrace
      - name: Upload desktop windows zip
        uses: actions/upload-artifact@v4
        with:
          name: export-desktop-windows
          path: game/build/dist/desktop/*-windows-x64.zip
          if-no-files-found: error
