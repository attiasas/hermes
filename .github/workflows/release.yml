name: Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Clean
        run: ./gradlew clean --no-daemon

      - name: Build engine and publish to Maven local
        run: ./gradlew build publishToMavenLocal :hermes-core:test hermes-tooling-test :hermes-gradle-plugin:test :hermes-cli:test --no-daemon --stacktrace

      - name: Export game distributions
        run: |
          ./gradlew :dogfood-simulation:hermesExportHtml :dogfood-simulation:hermesExportAndroid :dogfood-simulation:zipHermesExportDesktopLinuxX64 --no-daemon --stacktrace

      - name: Validate export zips
        run: |
          chmod +x .github/scripts/validate-export-zip.sh
          .github/scripts/validate-export-zip.sh html "$(ls dogfood-simulation/build/dist/html/*-html.zip)"
          .github/scripts/validate-export-zip.sh android "$(ls dogfood-simulation/build/dist/android/*-android.zip)"
          .github/scripts/validate-export-zip.sh desktop-linux "$(ls dogfood-simulation/build/dist/desktop/*-linux-x64.zip)"

      - name: Upload engine artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hermes-engine
          if-no-files-found: error
          path: |
            hermes-launcher-desktop/build/distributions/*.zip
            hermes-launcher-desktop/build/libs/*.jar
            hermes-api/build/libs/*.jar
            hermes-core/build/libs/*.jar
            dogfood-simulation/build/libs/*.jar
            dogfood-simulation/build/dist/**/*.zip

  build-cli:
    needs: build-engine
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_id: linux
            arch: x64
          - os: macos-latest
            os_id: macos
            arch: aarch64
          - os: windows-latest
            os_id: windows
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build CLI distribution
        run: ./gradlew :hermes-cli:distZip --no-daemon --stacktrace

      - name: Rename CLI artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="0.1.0-SNAPSHOT"
          fi
          mkdir -p release-cli
          ZIP=$(ls hermes-cli/build/distributions/hermes-cli-*.zip | head -1)
          cp "$ZIP" "release-cli/hermes-cli-${VERSION}-${{ matrix.os_id }}-${{ matrix.arch }}.zip"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: hermes-cli-${{ matrix.os_id }}
          if-no-files-found: error
          path: release-cli/*.zip

  release:
    needs: [ build-engine, build-cli ]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.zip
            dist/**/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
