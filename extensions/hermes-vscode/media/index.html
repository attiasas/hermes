<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hermes Studio</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
        background: #1a1d23;
        color: #e8eaed;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #toolbar {
        display: flex;
        gap: 0.5rem;
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid #333;
        align-items: center;
      }
      #toolbar button {
        padding: 0.35rem 0.75rem;
        cursor: pointer;
      }
      #status {
        margin-left: auto;
        opacity: 0.8;
        font-size: 0.85rem;
      }
      #layout {
        flex: 1;
        display: grid;
        grid-template-columns: 220px 1fr 280px;
        grid-template-rows: 1fr 180px;
        min-height: 0;
      }
      .panel {
        border: 1px solid #333;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panel h2 {
        margin: 0;
        font-size: 0.8rem;
        padding: 0.35rem 0.5rem;
        background: #252830;
        border-bottom: 1px solid #333;
      }
      .panel-body {
        flex: 1;
        overflow: auto;
        padding: 0.5rem;
        min-height: 0;
      }
      #hierarchy-panel {
        grid-row: 1 / span 2;
      }
      #center-panels {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      #center-panels .panel {
        flex: 1;
      }
      #logs-panel {
        grid-column: 2 / span 2;
      }
      #hierarchy,
      #files-tree {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      #hierarchy li,
      #files-tree li {
        padding: 0.2rem 0;
        cursor: pointer;
      }
      #hierarchy li.selected {
        background: #3a4a6a;
      }
      .field {
        margin-bottom: 0.5rem;
      }
      .field label {
        display: block;
        font-size: 0.75rem;
        opacity: 0.75;
      }
      .config-section {
        border: 1px solid #333;
        margin-bottom: 0.5rem;
      }
      .config-section summary {
        cursor: pointer;
        padding: 0.35rem 0.5rem;
        background: #252830;
      }
      .config-section .section-body {
        padding: 0.5rem;
      }
      #config-toolbar {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }
      #config-dirty {
        font-size: 0.75rem;
        color: #f5c542;
      }
      #logs {
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        white-space: pre-wrap;
        margin: 0;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-BN1jmV_8.js"></script>
  </head>
  <body>
    <div id="toolbar">
      <button id="btn-play" type="button">Play</button>
      <button id="btn-stop" type="button">Stop</button>
      <span id="status">Disconnected</span>
    </div>
    <div id="layout">
      <div id="hierarchy-panel" class="panel">
        <h2>Hierarchy</h2>
        <div class="panel-body"><ul id="hierarchy"></ul></div>
      </div>
      <div id="center-panels">
        <div id="inspector-panel" class="panel">
          <h2>Inspector</h2>
          <div class="panel-body" id="inspector"></div>
        </div>
        <div id="config-panel-mount" class="panel"></div>
      </div>
      <div id="files-panel" class="panel">
        <h2>Files</h2>
        <div class="panel-body"><ul id="files-tree"></ul></div>
      </div>
      <div id="logs-panel" class="panel">
        <h2>Logs</h2>
        <div class="panel-body"><pre id="logs"></pre></div>
      </div>
    </div>
  </body>
</html>
